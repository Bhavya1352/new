<svg width="900" height="400" viewBox="0 0 900 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="400" fill="white"/>
  
  <!-- Title -->
  <text x="450" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">Insurance Coverage Comparison</text>
  
  <!-- Basic Plan -->
  <rect x="50" y="100" width="200" height="250" rx="10" fill="#dbeafe"/>
  <text x="150" y="130" font-size="18" font-weight="bold" text-anchor="middle" fill="#2563eb">Basic Plan</text>
  <text x="150" y="160" font-size="28" font-weight="bold" text-anchor="middle" fill="#2563eb">$49/mo</text>
  <rect x="70" y="180" width="160" height="30" rx="5" fill="#3b82f6"/>
  <text x="150" y="202" font-size="14" text-anchor="middle" fill="white">$100K Coverage</text>
  <rect x="70" y="220" width="160" height="20" rx="5" fill="#60a5fa"/>
  <text x="150" y="235" font-size="12" text-anchor="middle" fill="white">Accidental Death</text>
  <rect x="70" y="250" width="160" height="20" rx="5" fill="#93c5fd"/>
  <text x="150" y="265" font-size="12" text-anchor="middle" fill="white">24/7 Support</text>
  
  <!-- Premium Plan -->
  <rect x="350" y="80" width="200" height="270" rx="10" fill="#d1fae5"/>
  <circle cx="450" cy="95" r="15" fill="#f59e0b"/>
  <text x="450" y="100" font-size="16" text-anchor="middle" fill="white">★</text>
  <text x="450" y="130" font-size="18" font-weight="bold" text-anchor="middle" fill="#10b981">Premium Plan</text>
  <text x="450" y="160" font-size="28" font-weight="bold" text-anchor="middle" fill="#10b981">$99/mo</text>
  <rect x="370" y="180" width="160" height="40" rx="5" fill="#10b981"/>
  <text x="450" y="205" font-size="14" text-anchor="middle" fill="white">$500K Coverage</text>
  <rect x="370" y="230" width="160" height="30" rx="5" fill="#34d399"/>
  <text x="450" y="250" font-size="12" text-anchor="middle" fill="white">Critical Illness</text>
  <rect x="370" y="270" width="160" height="25" rx="5" fill="#6ee7b7"/>
  <text x="450" y="287" font-size="12" text-anchor="middle" fill="white">Priority Support</text>
  <rect x="370" y="305" width="160" height="25" rx="5" fill="#a7f3d0"/>
  <text x="450" y="322" font-size="12" text-anchor="middle" fill="white">Health Checkup</text>
  
  <!-- Elite Plan -->
  <rect x="650" y="100" width="200" height="250" rx="10" fill="#fef3c7"/>
  <text x="750" y="130" font-size="18" font-weight="bold" text-anchor="middle" fill="#f59e0b">Elite Plan</text>
  <text x="750" y="160" font-size="28" font-weight="bold" text-anchor="middle" fill="#f59e0b">$149/mo</text>
  <rect x="670" y="180" width="160" height="35" rx="5" fill="#f59e0b"/>
  <text x="750" y="203" font-size="14" text-anchor="middle" fill="white">$1M Coverage</text>
  <rect x="670" y="225" width="160" height="25" rx="5" fill="#fbbf24"/>
  <text x="750" y="242" font-size="12" text-anchor="middle" fill="white">Worldwide</text>
  <rect x="670" y="260" width="160" height="25" rx="5" fill="#fcd34d"/>
  <text x="750" y="277" font-size="12" text-anchor="middle" fill="white">Dedicated Manager</text>
  <rect x="670" y="295" width="160" height="25" rx="5" fill="#fde68a"/>
  <text x="750" y="312" font-size="12" text-anchor="middle" fill="white">Quarterly Checkup</text>
</svg>
